<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


    <!-- CSS personalizado -->
    <link rel="stylesheet" href="/static/estilos.css">
</head>
<body>

<!-- NAVBAR SUPERIOR -->
<nav class="navbar navbar-dark bg-primary shadow fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">💊 Panel de Farmacia</a>
    <button id="toggleDarkMode" class="btn btn-secondary">Modo oscuro</button>

  </div>
</nav>

<style>
    .arrow {
        transition: transform 0.3s ease;
        float: right;
    }
    .collapsed .arrow {
        transform: rotate(0deg);
    }
    .arrow.rotate {
        transform: rotate(90deg);
    }
</style>

<!-- SIDEBAR -->
<div class="bg-dark text-white p-3" style="min-height:100vh; width: 250px; position: fixed;">
    <h3 class="text-center mb-4">Panel Farmacia</h3>

    <ul class="nav flex-column">

        <!-- ============= CLIENTES (desplegable) ============= -->
        <li class="nav-item">
            <a class="nav-link text-white d-flex justify-content-between align-items-center" 
               data-bs-toggle="collapse" href="#submenuClientes" role="button">
                👥 Clientes 
                <span class="arrow">▶</span>
            </a>

            <div class="collapse ps-3" id="submenuClientes">
                <a class="nav-link text-white" href="/clientes">• Ver todos</a>
                <a class="nav-link text-white" href="/buscar_cliente">• Buscar cliente</a>
            </div>
        </li>

        <hr class="text-secondary">

        <!-- ============= MEDICAMENTOS (desplegable) ============= -->
        <li class="nav-item">
            <a class="nav-link text-white d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#submenuMedicamentos" role="button">
                💊 Medicamentos 
                <span class="arrow">▶</span>
            </a>

            <div class="collapse ps-3" id="submenuMedicamentos">
                <a class="nav-link text-white" href="/medicamentos">• Ver todos</a>
                <a class="nav-link text-white" href="/medicamentos_receta">• Requieren receta</a>
                <a class="nav-link text-white" href="/medicamentos_vencer">• Por vencer</a>
            </div>
        </li>

        <hr class="text-secondary">

        <!-- ============= BUSCAR RECETAS ============= -->
        <li class="nav-item">
            <a class="nav-link text-white" href="/receta_detalle">
                🧾 Buscar Recetas
            </a>
        </li>

        <hr class="text-secondary">

        <!-- ============= VENTAS (desplegable) ============= -->
        <li class="nav-item">
            <a class="nav-link text-white d-flex justify-content-between align-items-center"
               data-bs-toggle="collapse" href="#submenuVentas" role="button">
                💰 Ventas 
                <span class="arrow">▶</span>
            </a>

            <div class="collapse ps-3" id="submenuVentas">
                <a class="nav-link text-white" href="/ventas_fechas">• Ventas por fechas</a>
                <a class="nav-link text-white" href="/venta_detalle">• Detalle de venta</a>
            </div>
        </li>

        <hr class="text-secondary">

        <!-- ============= DISTRIBUIDORES ============= -->
        <li class="nav-item">
            <a class="nav-link text-white" href="/distribuidores">
                🚚 Distribuidores
            </a>
        </li>

    </ul>
</div>

<script>
    // Gira la flecha al abrir/cerrar
    const collapses = document.querySelectorAll('[data-bs-toggle="collapse"]');

    collapses.forEach(item => {
        item.addEventListener('click', function () {
            const arrow = this.querySelector('.arrow');
            const target = document.querySelector(this.getAttribute('href'));

            setTimeout(() => {
                if (target.classList.contains('show')) {
                    arrow.classList.remove('rotate');
                } else {
                    arrow.classList.add('rotate');
                }
            }, 150);
        });
    });
</script>


<!-- CONTENIDO -->
<div class="main-content">
    {% block contenido %}
    {% endblock %}
</div>


    <!-- 🔥 Script del modo oscuro -->
    <script>
        const toggleButton = document.getElementById("toggleDarkMode");
        const body = document.body;

        // Cargar preferencia guardada
        if (localStorage.getItem("dark-mode") === "enabled") {
            body.classList.add("dark-mode");
        }

        toggleButton.addEventListener("click", () => {
            body.classList.toggle("dark-mode");

            if (body.classList.contains("dark-mode")) {
                localStorage.setItem("dark-mode", "enabled");
            } else {
                localStorage.setItem("dark-mode", "disabled");
            }
        });
    </script>

</body>
</html>
